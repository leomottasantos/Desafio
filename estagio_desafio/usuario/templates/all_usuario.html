{% extends "master.html" %}

{% block title %}
  Usuarios - List of all usuarios
{% endblock %}


{% block content %}

  <p><a href="/">HOME</a></p>
  
  <h1>Usuarios</h1>
  
  <ul>
    {% for x in myusuario %}
      <li><a href="details/{{ x.id }}">{{ x.firstname }} {{ x.lastname }}</a></li>
    {% endfor %}
  </ul>
{% endblock %}
